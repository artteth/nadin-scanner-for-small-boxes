<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Сканер упаковки">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/nadin-scanner-for-small-boxes/manifest.json">
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Сканер упаковки v97</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 24px; text-align: center; }

    /* ── IDLE состояние ── */
    .barcode-label { font-size: 14px; color: #6b7280; margin-bottom: 8px; }
    #barcodeInput {
      width: 100%;
      height: 56px;
      font-size: 22px;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 0 16px;
      outline: none;
      letter-spacing: 2px;
      color: #111827;
    }
    #barcodeInput:focus { border-color: #15803d; }

    .btn {
      display: block;
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
    }
    .btn-primary { background: #15803d; color: white; }
    .btn-primary:active { background: #166534; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:active { background: #e5e7eb; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:active { background: #b91c1c; }

    /* ── ALREADY_PACKED состояние ── */
    .packed-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
    .packed-title { font-size: 20px; font-weight: 700; color: #15803d; text-align: center; margin-bottom: 6px; }
    .packed-model { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 4px; font-family: monospace; }
    .packed-type { font-size: 32px; color: #15803d; text-align: center; font-weight: 700; margin-bottom: 24px; line-height: 1.2; }

    .btn-ok { background: #15803d; color: white; font-size: 20px; position: relative; }
    .btn-ok:active { background: #166534; }
    .timer-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 5px;
      background: rgba(255,255,255,0.5);
      border-radius: 0 0 12px 12px;
      transition: width 1s linear;
    }

    .btn-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn-row .btn { margin-top: 0; }

    /* ── SELECT_PACK состояние ── */
    .select-label { font-size: 15px; color: #374151; margin-bottom: 8px; font-weight: 600; }
    .select-model { font-size: 13px; color: #9ca3af; margin-bottom: 16px; font-family: monospace; }
    select#packSelect {
      width: 100%;
      height: 56px;
      font-size: 17px;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 0 12px;
      outline: none;
      color: #111827;
      background: #f9fafb;
      margin-bottom: 4px;
    }
    select#packSelect:focus { border-color: #15803d; }
    .pack-btn {
      display: block;
      width: 100%;
      height: 64px;
      border: 2px solid #d1d5db;
      border-radius: 14px;
      background: #f9fafb;
      color: #111827;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.15s;
    }
    .pack-btn:hover { border-color: #15803d; background: #f0fdf4; }
    .pack-btn:active { transform: scale(0.97); }
    .pack-btn.selected { border-color: #15803d; background: #15803d; color: white; }

    /* ── SAVING состояние ── */
    .saving-wrap { text-align: center; padding: 20px 0; }
    .spinner {
      width: 56px; height: 56px;
      border: 6px solid #e5e7eb;
      border-top: 6px solid #15803d;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .saving-text { font-size: 16px; color: #6b7280; }

    /* ── SUCCESS состояние ── */
    .success-wrap { text-align: center; padding: 20px 0; }
    .success-icon { font-size: 56px; margin-bottom: 12px; }
    .success-text { font-size: 20px; font-weight: 700; color: #15803d; }

    /* ── ERROR состояние ── */
    .error-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
    .error-text { font-size: 16px; color: #dc2626; text-align: center; margin-bottom: 24px; line-height: 1.5; }

    /* Информация о сканировании */
    .scan-info { background: #f8fafc; border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; text-align: center; }
    .scan-barcode { font-size: 13px; color: #9ca3af; margin-bottom: 4px; font-family: monospace; }
    .scan-model { font-size: 18px; font-weight: 700; color: #111827; font-family: monospace; margin-bottom: 8px; }
    .scan-photo { text-align: center; margin: 12px 0 0; }
    .scan-photo img { max-width: 100%; max-height: 300px; border-radius: 12px; object-fit: contain; box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; }
    .no-photo { color: #9ca3af; font-size: 14px; font-style: italic; margin: 12px 0; }

    /* Полноэкранное фото */
    .photo-overlay {
      position: fixed; inset: 0; z-index: 99999;
      background: rgba(0,0,0,0.9);
      display: none; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .photo-overlay.active { display: flex; }
    .photo-overlay img {
      max-width: 95vw; max-height: 95vh;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
    }

    /* Утилиты */
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <h1>📦 Сканер упаковки v97</h1>

  <!-- Прелоадер — показывается при загрузке данных -->
  <div id="preloader" class="hidden">
    <div class="saving-wrap">
      <div class="spinner"></div>
      <div class="saving-text">Загружаю данные...</div>
    </div>
  </div>

  <!-- IDLE -->
  <!-- Информация о текущем сканировании -->
  <div id="scanInfo" class="scan-info hidden">
    <div class="scan-barcode" id="scanBarcode"></div>
    <div class="scan-model" id="scanModel"></div>
    <div class="scan-photo" id="scanPhoto">
      <!-- заполняется из JS -->
    </div>
  </div>

  <div id="stateIdle">
    <p class="barcode-label">Введите или отсканируйте штрих-код</p>
    <input type="text" id="barcodeInput" placeholder="Штрих-код..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn btn-primary" onclick="onSearch()">Найти</button>
  </div>

  <!-- ALREADY_PACKED -->
  <div id="stateAlreadyPacked" class="hidden">
    <div class="packed-icon">✅</div>
    <div class="packed-title">Уже упаковано</div>
    <div class="packed-model" id="packedModel"></div>
    <div class="packed-type" id="packedType"></div>
    <button class="btn btn-ok" id="btnOk" onclick="onOk()">
      OK (<span id="timerCount">10</span>)
      <div class="timer-bar" id="timerBar" style="width:100%"></div>
    </button>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="onEdit()">Изменить</button>
    </div>
  </div>

  <!-- SELECT_PACK -->
  <div id="stateSelectPack" class="hidden">
    <p class="select-label">Выберите тип упаковки</p>
    <p class="select-model" id="selectModel"></p>
    <div id="packButtons">
      <button class="pack-btn" onclick="selectPack(this,'коробка мелкая старая пробная')">коробка мелкая старая пробная</button>
      <button class="pack-btn" onclick="selectPack(this,'коробка S 28x19.5x30')">коробка S 28x19.5x30</button>
      <button class="pack-btn" onclick="selectPack(this,'пакет S 30x20')">пакет S 30x20</button>
      <button class="pack-btn" onclick="selectPack(this,'пакет L 60x30')">пакет L 60x30</button>
    </div>
    <button class="btn btn-primary" id="btnSavePack" onclick="onSave()" style="margin-top:16px;opacity:0.4;pointer-events:none">Сохранить</button>
    <button class="btn btn-secondary" onclick="goIdle()">Отмена</button>
  </div>

  <!-- SAVING -->
  <div id="stateSaving" class="hidden">
    <div class="saving-wrap">
      <div class="spinner"></div>
      <div class="saving-text">Сохраняю...</div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div id="stateSuccess" class="hidden">
    <div class="success-wrap">
      <div class="success-icon">🎉</div>
      <div class="success-text">Сохранено!</div>
    </div>
  </div>

  <!-- ERROR -->
  <div id="stateError" class="hidden">
    <div class="error-icon">❌</div>
    <div class="error-text" id="errorText"></div>
    <button class="btn btn-secondary" onclick="goIdle()">Назад</button>
  </div>
</div>

<script>
// ── Apps Script URL — бэкенд ──
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwg4XoEi9Gmxv-SY2K_KglrSh64agoFitr6pwCIM9MxubDaq50URogmfDpEkuZc7NBUag/exec';

let currentModel = '';
let timerInterval = null;
let timerSeconds = 10;

// ── Предзагруженные данные ──
let barcodeToModel = {};   // штрих-код → { model, repacked, packType }
let dataLoaded = false;
let dataLoadError = null;

// ── API-обёртка через JSONP (обход CORS) ──
let _apiCallId = 0;
function apiCall(action, params) {
  return new Promise(function(resolve) {
    const id = '_apiCb' + (++_apiCallId);
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', id);
    if (params) {
      Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    }
    window[id] = function(result) {
      resolve(result);
      delete window[id];
      script.remove();
    };
    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = function() {
      resolve({ error: 'Network error' });
      delete window[id];
      script.remove();
    };
    document.head.appendChild(script);
  });
}

const states = ['stateIdle', 'stateAlreadyPacked', 'stateSelectPack', 'stateSaving', 'stateSuccess', 'stateError'];

function showState(name) {
  states.forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(name).classList.remove('hidden');
}

function goIdle() {
  clearTimer();
  currentModel = '';
  document.getElementById('barcodeInput').value = '';
  document.getElementById('packSelect') && (document.getElementById('packSelect').value = '');
  // Сброс кнопок
  document.querySelectorAll('.pack-btn').forEach(b => b.classList.remove('selected'));
  var saveBtn = document.getElementById('btnSavePack');
  if(saveBtn){ saveBtn.style.opacity='0.4'; saveBtn.style.pointerEvents='none'; }
  // Скрываем информацию о сканировании
  document.getElementById('scanInfo').classList.add('hidden');
  showState('stateIdle');
  setTimeout(() => document.getElementById('barcodeInput').focus(), 100);
}

// Автоматически ищем при нажатии Enter в поле
document.getElementById('barcodeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') onSearch();
});

/**
 * Предзагрузка всех данных при старте.
 * Загружаем все штрих-коды, модели и статусы упаковки в память.
 * После этого поиск работает локально — мгновенно!
 */
function preloadAllData() {
  showPreloader(true);
  apiCall('getAllBarcodes')
    .then(function(result) {
      showPreloader(false);
      if (result.error) {
        dataLoadError = result.error;
        showError('Ошибка загрузки: ' + result.error);
      } else {
        barcodeToModel = result.barcodes || {};
        dataLoaded = true;
        document.getElementById('barcodeInput').focus();
      }
    });
}

function showPreloader(show) {
  const el = document.getElementById('preloader');
  if (!el) return;
  if (show) {
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
  }
}

function onSearch() {
  const barcode = document.getElementById('barcodeInput').value.trim();
  if (!barcode) return;

  // Если данные ещё не загрузились — ждём
  if (!dataLoaded && !dataLoadError) {
    showState('stateSaving');
    setTimeout(function() { onSearch(); }, 300);
    return;
  }

  // Локальный поиск — мгновенно!
  const item = barcodeToModel[barcode.toString().trim()];
  if (!item) {
    showError('Штрих-код не найден');
    return;
  }

  // Показываем штрих-код, модель и фото
  document.getElementById('scanBarcode').textContent = 'Штрих-код: ' + barcode;
  document.getElementById('scanModel').textContent = 'Модель: ' + item.model;
  // Фото или "фото не найдено"
  const photoEl = document.getElementById('scanPhoto');
  if (item.photoUrl) {
    photoEl.innerHTML = '<img src="' + item.photoUrl + '" alt="Изделие" onclick="openPhotoFullscreen(this.src)">';
  } else {
    photoEl.innerHTML = '<div class="no-photo">Фото не найдено</div>';
  }
  document.getElementById('scanInfo').classList.remove('hidden');

  currentModel = item.model;

  if (item.repacked) {
    // Уже упаковлено
    document.getElementById('packedModel').textContent = item.model;
    document.getElementById('packedType').textContent = item.packType || '(тип не указан)';
    showState('stateAlreadyPacked');
    startTimer();
  } else {
    // Не упаковлено — выбор упаковки
    document.getElementById('selectModel').textContent = item.model;
    document.getElementById('packSelect') && (document.getElementById('packSelect').value = '');
  // Сброс кнопок
  document.querySelectorAll('.pack-btn').forEach(b => b.classList.remove('selected'));
  var saveBtn = document.getElementById('btnSavePack');
  if(saveBtn){ saveBtn.style.opacity='0.4'; saveBtn.style.pointerEvents='none'; }
  showState('stateSelectPack');
  }
}

function startTimer() {
  clearTimer();
  timerSeconds = 10;
  updateTimerDisplay();
  document.getElementById('timerBar').style.width = '100%';

  setTimeout(function() {
    document.getElementById('timerBar').style.width = '0%';
    document.getElementById('timerBar').style.transitionDuration = '10s';
  }, 50);

  timerInterval = setInterval(function() {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearTimer();
      goIdle();
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timerCount').textContent = timerSeconds;
}

function clearTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function onOk() {
  clearTimer();
  goIdle();
}

function onEdit() {
  clearTimer();
  document.getElementById('selectModel').textContent = currentModel;
  document.getElementById('packSelect') && (document.getElementById('packSelect').value = '');
  // Сброс кнопок
  document.querySelectorAll('.pack-btn').forEach(b => b.classList.remove('selected'));
  var saveBtn = document.getElementById('btnSavePack');
  if(saveBtn){ saveBtn.style.opacity='0.4'; saveBtn.style.pointerEvents='none'; }
  // Скрываем информацию о сканировании
  document.getElementById('scanInfo').classList.add('hidden');
  showState('stateSelectPack');
}

var selectedPackType = '';

function selectPack(el, value) {
  document.querySelectorAll('.pack-btn').forEach(function(b) {
    b.classList.remove('selected');
  });
  el.classList.add('selected');
  selectedPackType = value;
  var saveBtn = document.getElementById('btnSavePack');
  if (saveBtn) {
    saveBtn.style.opacity = '1';
    saveBtn.style.pointerEvents = 'auto';
  }
}

// Полноэкранное фото
function openPhotoFullscreen(src) {
  var overlay = document.getElementById('photoOverlay');
  document.getElementById('photoOverlayImg').src = src;
  overlay.classList.add('active');
}
function closePhotoFullscreen() {
  document.getElementById('photoOverlay').classList.remove('active');
}

function onSave() {
  const packType = selectedPackType;
  if (!packType) {
    alert('Выберите тип упаковки');
    return;
  }
  if (!currentModel) {
    showError('Модель не определена, начните заново');
    return;
  }

  showState('stateSaving');

  apiCall('savePackaging', { model: currentModel, packType: packType })
    .then(function(result) {
      if (!result.success) {
        showError(result.error || 'Ошибка сохранения');
        return;
      }
      // Обновляем предзагруженные данные — галочка + тип упаковки
      Object.keys(barcodeToModel).forEach(function(bc) {
        if (barcodeToModel[bc].model === currentModel) {
          barcodeToModel[bc].repacked = true;
          barcodeToModel[bc].packType = packType;
        }
      });
      showState('stateSuccess');
      setTimeout(goIdle, 1200);
    });
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  showState('stateError');
}

// ── Service Worker для PWA ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/nadin-scanner-for-small-boxes/sw.js')
      .catch(function(err) { /* ignore */ });
  });
}

// При загрузке: фокус + предзагрузка всех данных
window.onload = function() {
  preloadAllData();
};
</script>

<!-- Полноэкранное фото -->
<div class="photo-overlay" id="photoOverlay" onclick="closePhotoFullscreen()">
  <img id="photoOverlayImg" src="" alt="Фото">
</div>

</body>
</html>
