<!DOCTYPE html>
<html lang="ru">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#15803d">

  <title>Сканер упаковки v111</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(8px, 2vw, 16px);
      padding-top: max(clamp(8px, 2vw, 16px), env(safe-area-inset-top));
      padding-bottom: max(clamp(8px, 2vw, 16px), env(safe-area-inset-bottom));
      padding-left: max(clamp(8px, 2vw, 16px), env(safe-area-inset-left));
      padding-right: max(clamp(8px, 2vw, 16px), env(safe-area-inset-right));
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    .card {
      background: white;
      border-radius: clamp(12px, 3vw, 20px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: clamp(12px, 3vw, 28px) clamp(12px, 3vw, 24px);
      width: 100%;
      max-width: min(600px, 95vw);
      max-height: calc(100dvh - 2 * clamp(8px, 2vw, 16px));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-sizing: border-box;
    }

    h1 {
      font-size: clamp(24px, 6vw, 48px);
      font-weight: 700;
      color: #111827;
      margin: 0 0 clamp(12px, 3vw, 24px);
      text-align: center;
      line-height: 1.2;
    }

    /* ── IDLE состояние ── */
    .barcode-label {
      font-size: clamp(16px, 4vw, 28px);
      color: #6b7280;
      margin: 0 0 clamp(6px, 1.5vw, 12px);
      text-align: center;
    }
    #barcodeInput {
      width: 100%;
      height: clamp(56px, 15vw, 112px);
      font-size: clamp(22px, 6vw, 44px);
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 0 16px;
      outline: none;
      letter-spacing: 2px;
      color: #111827;
    }
    #barcodeInput:focus { border-color: #15803d; }

    .btn {
      display: block;
      width: 100%;
      height: clamp(56px, 15vw, 112px);
      border: none;
      border-radius: clamp(8px, 2vw, 24px);
      font-size: clamp(18px, 5vw, 36px);
      font-weight: 600;
      cursor: pointer;
      margin-top: clamp(8px, 2vw, 14px);
    }
    .btn-primary { background: #15803d; color: white; margin-top: clamp(12px, 3vw, 24px); }
    .btn-primary:active { background: #166534; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:active { background: #e5e7eb; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:active { background: #b91c1c; }

    /* ── ALREADY_PACKED состояние ── */
    .packed-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
    .packed-header { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .packed-icon-small { font-size: 24px; }
    .packed-title-inline { font-size: 20px; font-weight: 700; color: #15803d; }
    .packed-photo { text-align: center; margin: 10px 0 0; }
    .packed-photo img { max-width: 100%; max-height: 250px; border-radius: 12px; object-fit: contain; box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; }
    .packed-title { font-size: 20px; font-weight: 700; color: #15803d; text-align: center; margin-bottom: 6px; }
    .packed-barcode { font-size: 20px; color: #111827; text-align: center; font-weight: 700; margin-bottom: 4px; font-family: monospace; }
    .packed-model { font-size: 16px; color: #6b7280; text-align: center; margin-bottom: 4px; font-family: monospace; }
    .packed-type { font-size: 56px; color: #15803d; text-align: center; font-weight: 700; margin-bottom: 24px; line-height: 1.2; }

    .btn-ok { background: #15803d; color: white; font-size: 20px; position: relative; }
    .btn-ok:active { background: #166534; }
    .timer-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 5px;
      background: rgba(255,255,255,0.5);
      border-radius: 0 0 12px 12px;
      transition: width 1s linear;
    }

    .btn-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn-row .btn { margin-top: 0; }

    /* ── SELECT_PACK состояние ── */
    .select-label { font-size: 15px; color: #374151; margin-bottom: 8px; font-weight: 600; }
    .select-model { font-size: 13px; color: #9ca3af; margin-bottom: 16px; font-family: monospace; }
    select#packSelect {
      width: 100%;
      height: 56px;
      font-size: 17px;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 0 12px;
      outline: none;
      color: #111827;
      background: #f9fafb;
      margin-bottom: 4px;
    }
    select#packSelect:focus { border-color: #15803d; }
    .pack-btn {
      display: block;
      width: 100%;
      height: 64px;
      border: 2px solid #d1d5db;
      border-radius: 14px;
      background: #f9fafb;
      color: #111827;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.15s;
    }
    .pack-btn:hover { border-color: #15803d; background: #f0fdf4; }
    .pack-btn:active { transform: scale(0.97); }
    .pack-btn.selected { border-color: #15803d; background: #15803d; color: white; }

    /* ── SAVING состояние ── */
    .saving-wrap { text-align: center; padding: 20px 0; }
    .spinner {
      width: 56px; height: 56px;
      border: 6px solid #e5e7eb;
      border-top: 6px solid #15803d;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .saving-text { font-size: 16px; color: #6b7280; }

    /* ── SUCCESS состояние ── */
    .success-wrap { text-align: center; padding: 20px 0; }
    .success-icon { font-size: 56px; margin-bottom: 12px; }
    .success-text { font-size: 20px; font-weight: 700; color: #15803d; }

    /* ── ERROR состояние ── */
    .error-icon { font-size: 48px; text-align: center; margin-bottom: 12px; }
    .error-text { font-size: 16px; color: #dc2626; text-align: center; margin-bottom: 24px; line-height: 1.5; }

    /* Информация о сканировании */
    .scan-info { background: #f8fafc; border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; text-align: center; }
    .scan-barcode { font-size: 18px; color: #111827; margin-bottom: 4px; font-family: monospace; font-weight: 700; }
    .scan-model { font-size: 18px; font-weight: 700; color: #111827; font-family: monospace; margin-bottom: 8px; }
    .scan-photo { text-align: center; margin: 12px 0 0; }
    .scan-photo img { max-width: 100%; max-height: 300px; border-radius: 12px; object-fit: contain; box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; }
    .no-photo { color: #9ca3af; font-size: 14px; font-style: italic; margin: 12px 0; }

    /* Полноэкранное фото */
    .photo-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 99999;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: none;
      -webkit-overflow-scrolling: none;
    }
    .photo-overlay.active { display: flex; }
    .photo-overlay img {
      max-width: calc(100vw - 2 * env(safe-area-inset-left, 0px));
      max-height: calc(100vh - 2 * env(safe-area-inset-top, 0px));
      max-width: calc(100dvw - 16px);
      max-height: calc(100dvh - 16px);
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
      object-fit: contain;
    }

    /* ── КАМЕРА ── */
    .camera-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 99998;
      background: black;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .camera-overlay.active { display: flex; }
    #cameraVideo {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .scan-zone {
      position: relative;
      z-index: 1;
      width: min(80vw, 360px);
      height: min(28vw, 120px);
      border: 3px solid #15803d;
      border-radius: 14px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      overflow: hidden;
    }
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #15803d, transparent);
      animation: scanMove 2s ease-in-out infinite;
      top: 10%;
    }
    @keyframes scanMove {
      0%, 100% { top: 10%; }
      50% { top: 85%; }
    }
    .camera-close-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      right: 16px;
      z-index: 2;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .camera-hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 48px);
      z-index: 2;
      color: rgba(255,255,255,0.85);
      font-size: clamp(14px, 4vw, 18px);
      text-align: center;
      padding: 0 20px;
    }

    /* Утилиты */
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <h1 id="pageTitle">📦 Сканер упаковки v111</h1>

  <!-- Прелоадер — показывается при загрузке данных -->
  <div id="preloader" class="hidden">
    <div class="saving-wrap">
      <div class="spinner"></div>
      <div class="saving-text">Загружаю данные...</div>
    </div>
  </div>

  <!-- IDLE -->
  <!-- Информация о текущем сканировании -->
  <div id="scanInfo" class="scan-info hidden">
    <div class="scan-barcode" id="scanBarcode"></div>
    <div class="scan-model" id="scanModel"></div>
    <div class="scan-photo" id="scanPhoto">
      <!-- заполняется из JS -->
    </div>
  </div>

  <div id="stateIdle">
    <p class="barcode-label">Введите или отсканируйте штрих-код</p>
    <input type="text" id="barcodeInput" placeholder="Штрих-код..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn btn-primary" onclick="onSearch()">Найти</button>
    <button class="btn btn-secondary" onclick="openCamera()">📷 Сканировать камерой</button>
  </div>

  <!-- ALREADY_PACKED -->
  <div id="stateAlreadyPacked" class="hidden">
    <div class="packed-header">
      <span class="packed-icon-small">✅</span>
      <span class="packed-title-inline">Уже упаковано</span>
    </div>
    <div class="packed-barcode" id="packedBarcode"></div>
    <div class="packed-model" id="packedModel"></div>
    <div class="packed-type" id="packedType"></div>
    <div class="packed-photo" id="packedPhoto" style="display:none">
      <img id="packedPhotoImg" src="" alt="Изделие" onclick="openPhotoFullscreen(this.src)">
    </div>
    <button class="btn btn-ok" id="btnOk" onclick="onOk()">
      OK (<span id="timerCount">10</span>)
      <div class="timer-bar" id="timerBar" style="width:100%"></div>
    </button>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="onEdit()">Изменить</button>
    </div>
  </div>

  <!-- SELECT_PACK -->
  <div id="stateSelectPack" class="hidden">
    <p class="select-label">Выберите тип упаковки</p>
    <p class="select-model" id="selectModel"></p>
    <div id="packButtons">
      <button class="pack-btn" onclick="selectPack(this,'коробка мелкая старая пробная')">коробка мелкая старая пробная</button>
      <button class="pack-btn" onclick="selectPack(this,'коробка S 28x19.5x30')">коробка S 28x19.5x30</button>
      <button class="pack-btn" onclick="selectPack(this,'пакет S 30x20')">пакет S 30x20</button>
      <button class="pack-btn" onclick="selectPack(this,'пакет L 60x30')">пакет L 60x30</button>
    </div>
    <button class="btn btn-primary" id="btnSavePack" onclick="onSave()" style="margin-top:16px;opacity:0.4;pointer-events:none">Сохранить</button>
    <button class="btn btn-secondary" onclick="goIdle()">Отмена</button>
  </div>

  <!-- SAVING -->
  <div id="stateSaving" class="hidden">
    <div class="saving-wrap">
      <div class="spinner"></div>
      <div class="saving-text">Сохраняю...</div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div id="stateSuccess" class="hidden">
    <div class="success-wrap">
      <div class="success-icon">🎉</div>
      <div class="success-text">Сохранено!</div>
    </div>
  </div>

  <!-- ERROR -->
  <div id="stateError" class="hidden">
    <div class="error-icon">❌</div>
    <div class="error-text" id="errorText"></div>
    <button class="btn btn-ok" id="btnErrorOk" onclick="clearErrorTimer();goIdle();">
      Назад (<span id="errorTimerCount">5</span>)
      <div class="timer-bar" id="errorTimerBar" style="width:100%"></div>
    </button>
  </div>
</div>

<script>
// ── Apps Script URL — бэкенд ──
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwg4XoEi9Gmxv-SY2K_KglrSh64agoFitr6pwCIM9MxubDaq50URogmfDpEkuZc7NBUag/exec';

let currentModel = '';
let timerInterval = null;
let timerSeconds = 10;

// ── Предзагруженные данные ──
let barcodeToModel = {};   // штрих-код → { model, repacked, packType }
let dataLoaded = false;
let dataLoadError = null;

// ── API-обёртка через JSONP (обход CORS) ──
let _apiCallId = 0;
function apiCall(action, params) {
  return new Promise(function(resolve) {
    const id = '_apiCb' + (++_apiCallId);
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('callback', id);
    if (params) {
      Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
    }
    window[id] = function(result) {
      resolve(result);
      delete window[id];
      script.remove();
    };
    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = function() {
      resolve({ error: 'Network error' });
      delete window[id];
      script.remove();
    };
    document.head.appendChild(script);
  });
}

const states = ['stateIdle', 'stateAlreadyPacked', 'stateSelectPack', 'stateSaving', 'stateSuccess', 'stateError'];

function showState(name) {
  states.forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(name).classList.remove('hidden');
}

function goIdle() {
  clearErrorTimer();
  clearTimer();
  closePhotoFullscreen();
  closeCamera();
  var t = document.getElementById('pageTitle');
  if (t) t.style.display = '';
  currentModel = '';
  document.getElementById('barcodeInput').value = '';
  document.getElementById('packSelect') && (document.getElementById('packSelect').value = '');
  // Сброс кнопок
  document.querySelectorAll('.pack-btn').forEach(b => b.classList.remove('selected'));
  var saveBtn = document.getElementById('btnSavePack');
  if(saveBtn){ saveBtn.style.opacity='0.4'; saveBtn.style.pointerEvents='none'; }
  // Скрываем информацию о сканировании
  document.getElementById('scanInfo').classList.add('hidden');
  showState('stateIdle');
  setTimeout(() => document.getElementById('barcodeInput').focus(), 100);
}

// Автоматически ищем при нажатии Enter в поле
document.getElementById('barcodeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') onSearch();
});

/**
 * Предзагрузка всех данных при старте.
 * Загружаем все штрих-коды, модели и статусы упаковки в память.
 * После этого поиск работает локально — мгновенно!
 */
function preloadAllData() {
  showPreloader(true);
  apiCall('getAllBarcodes')
    .then(function(result) {
      showPreloader(false);
      if (result.error) {
        dataLoadError = result.error;
        showError('Ошибка загрузки: ' + result.error);
      } else {
        barcodeToModel = result.barcodes || {};
        dataLoaded = true;
        document.getElementById('barcodeInput').focus();
      }
    });
}

function showPreloader(show) {
  const el = document.getElementById('preloader');
  if (!el) return;
  if (show) {
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
  }
}

function onSearch() {
  const barcode = document.getElementById('barcodeInput').value.trim();
  if (!barcode) return;

  // Если данные ещё не загрузились — ждём
  if (!dataLoaded && !dataLoadError) {
    showState('stateSaving');
    setTimeout(function() { onSearch(); }, 300);
    return;
  }

  // Локальный поиск — мгновенно!
  const item = barcodeToModel[barcode.toString().trim()];
  if (!item) {
    document.getElementById('pageTitle').style.display = 'none';
    showError('Штрих-код не найден');
    startErrorTimer();
    return;
  }

  // Показываем штрих-код, модель и фото
  document.getElementById('scanBarcode').textContent = 'Штрих-код: ' + barcode;
  document.getElementById('scanModel').textContent = 'Модель: ' + item.model;
  // Фото или "фото не найдено"
  const photoEl = document.getElementById('scanPhoto');
  if (item.photoUrl) {
    const img = document.createElement('img');
    img.src = item.photoUrl;
    img.alt = 'Изделие';
    img.id = 'scanPhotoImg';
    img.onclick = function() { openPhotoFullscreen(this.src); };
    photoEl.innerHTML = '';
    photoEl.appendChild(img);;
  } else {
    photoEl.innerHTML = '<div class="no-photo">Фото не найдено</div>';
  }
  document.getElementById('scanInfo').classList.remove('hidden');

  currentModel = item.model;

  if (item.repacked) {
    document.getElementById('scanInfo').classList.add('hidden');
    document.getElementById('pageTitle').style.display = 'none';
    document.getElementById('packedBarcode').textContent = barcode;
    document.getElementById('packedModel').textContent = item.model;
    document.getElementById('packedType').textContent = item.packType || '(тип не указан)';
    const pPhoto = document.getElementById('packedPhoto');
    const pImg = document.getElementById('packedPhotoImg');
    if (item.photoUrl) {
      pImg.src = item.photoUrl;
      pPhoto.style.display = 'block';
    } else {
      pPhoto.style.display = 'none';
    }
    showState('stateAlreadyPacked');
    startTimer();
  } else {
    // Не упаковлено — выбор упаковки
    document.getElementById('pageTitle').style.display = 'none';
    document.getElementById('scanInfo').classList.remove('hidden');
    document.getElementById('selectModel').textContent = item.model;
    document.getElementById('packSelect') && (document.getElementById('packSelect').value = '');
  // Сброс кнопок
  document.querySelectorAll('.pack-btn').forEach(b => b.classList.remove('selected'));
  var saveBtn = document.getElementById('btnSavePack');
  if(saveBtn){ saveBtn.style.opacity='0.4'; saveBtn.style.pointerEvents='none'; }
  showState('stateSelectPack');
  }
}

// ── Таймер для экрана ошибки ──
let errorTimerInterval = null;
let errorTimerSeconds = 5;

function startErrorTimer() {
  clearErrorTimer();
  errorTimerSeconds = 5;
  updateErrorTimerDisplay();
  document.getElementById('errorTimerBar').style.width = '100%';
  setTimeout(function() {
    document.getElementById('errorTimerBar').style.width = '0%';
    document.getElementById('errorTimerBar').style.transitionDuration = '5s';
  }, 50);
  errorTimerInterval = setInterval(function() {
    errorTimerSeconds--;
    updateErrorTimerDisplay();
    if (errorTimerSeconds <= 0) {
      clearErrorTimer();
      closePhotoFullscreen();
      goIdle();
    }
  }, 1000);
}

function updateErrorTimerDisplay() {
  var el = document.getElementById('errorTimerCount');
  if (el) el.textContent = errorTimerSeconds;
}

function clearErrorTimer() {
  if (errorTimerInterval) {
    clearInterval(errorTimerInterval);
    errorTimerInterval = null;
  }
}

function startTimer() {
  clearTimer();
  timerSeconds = 10;
  updateTimerDisplay();
  document.getElementById('timerBar').style.width = '100%';

  setTimeout(function() {
    document.getElementById('timerBar').style.width = '0%';
    document.getElementById('timerBar').style.transitionDuration = '10s';
  }, 50);

  timerInterval = setInterval(function() {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearTimer();
      closePhotoFullscreen();
      goIdle();
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timerCount').textContent = timerSeconds;
}

function clearTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function onOk() {
  clearTimer();
  goIdle();
}

function onEdit() {
  clearTimer();
  document.getElementById('selectModel').textContent = currentModel;
  document.getElementById('packSelect') && (document.getElementById('packSelect').value = '');
  // Сброс кнопок
  document.querySelectorAll('.pack-btn').forEach(b => b.classList.remove('selected'));
  var saveBtn = document.getElementById('btnSavePack');
  if(saveBtn){ saveBtn.style.opacity='0.4'; saveBtn.style.pointerEvents='none'; }
  // Скрываем информацию о сканировании
  document.getElementById('scanInfo').classList.add('hidden');
  showState('stateSelectPack');
}

var selectedPackType = '';

function selectPack(el, value) {
  document.querySelectorAll('.pack-btn').forEach(function(b) {
    b.classList.remove('selected');
  });
  el.classList.add('selected');
  selectedPackType = value;
  var saveBtn = document.getElementById('btnSavePack');
  if (saveBtn) {
    saveBtn.style.opacity = '1';
    saveBtn.style.pointerEvents = 'auto';
  }
}

function onSave() {
  const packType = selectedPackType;
  if (!packType) {
    alert('Выберите тип упаковки');
    return;
  }
  if (!currentModel) {
    showError('Модель не определена, начните заново');
    return;
  }

  showState('stateSaving');

  apiCall('savePackaging', { model: currentModel, packType: packType })
    .then(function(result) {
      if (!result.success) {
        showError(result.error || 'Ошибка сохранения');
        return;
      }
      // Обновляем предзагруженные данные — галочка + тип упаковки
      Object.keys(barcodeToModel).forEach(function(bc) {
        if (barcodeToModel[bc].model === currentModel) {
          barcodeToModel[bc].repacked = true;
          barcodeToModel[bc].packType = packType;
        }
      });
      showState('stateSuccess');
      setTimeout(goIdle, 1200);
    });
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  showState('stateError');
}

// ── Камера ──
var codeReader = null;
var zxingLoaded = false;

function loadZXing() {
  return new Promise(function(resolve, reject) {
    if (zxingLoaded) { resolve(); return; }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js';
    s.onload = function() { zxingLoaded = true; resolve(); };
    s.onerror = function() { reject(new Error('Не удалось загрузить библиотеку сканирования')); };
    document.head.appendChild(s);
  });
}

function openCamera() {
  document.getElementById('cameraOverlay').classList.add('active');
  loadZXing()
    .then(function() {
      var hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.ITF,
      ]);
      codeReader = new ZXing.BrowserMultiFormatReader(hints);
      return codeReader.decodeFromConstraints(
        { video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
        document.getElementById('cameraVideo'),
        function(result, err) {
          if (result) {
            closeCamera();
            document.getElementById('barcodeInput').value = result.getText();
            onSearch();
          }
        }
      );
    })
    .catch(function(e) {
      closeCamera();
      showError('Камера недоступна: ' + (e.message || e));
      startErrorTimer();
    });
}

function closeCamera() {
  document.getElementById('cameraOverlay').classList.remove('active');
  if (codeReader) {
    try { codeReader.reset(); } catch(e) {}
    codeReader = null;
  }
}

// ── Полноэкранное фото ──
function openPhotoFullscreen(src) {
  var overlay = document.getElementById('photoOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'photoOverlay';
    overlay.className = 'photo-overlay';
    overlay.onclick = closePhotoFullscreen;
    var img = document.createElement('img');
    img.id = 'photoOverlayImg';
    overlay.appendChild(img);
    document.body.appendChild(overlay);
  }
  document.getElementById('photoOverlayImg').src = src;
  overlay.classList.add('active');
}
function closePhotoFullscreen() {
  var overlay = document.getElementById('photoOverlay');
  if (overlay) overlay.classList.remove('active');
}

// При загрузке: фокус + предзагрузка всех данных + SW
window.onload = function() {
  preloadAllData();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }
};
