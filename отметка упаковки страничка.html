<!DOCTYPE html>
<html lang="ru">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отметка упаковки v.53</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 16px; font-size: 14px; }
    .header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
    .header h2 { font-size: 18px; font-weight: 600; color: #111827; }
    .ver { font-size: 12px; color: #6b7280; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-card { background: white; border-radius: 10px; padding: 10px 14px; display: flex; flex-direction: column; gap: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 22px; font-weight: 600; color: #111827; }
    .stat-value.green { color: #15803d; }
    .filters { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); padding: 12px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .filter-group label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
    .filter-group select, .filter-group input { height: 34px; border: 1px solid #d1d5db; border-radius: 8px; background: #f9fafb; color: #111827; font-size: 13px; padding: 0 10px; width: 100%; }
    .filter-group select:focus, .filter-group input:focus { outline: none; border-color: #6b7280; }
    .btn { height: 34px; padding: 0 14px; border: 1px solid #d1d5db; border-radius: 8px; cursor: pointer; font-size: 13px; background: white; color: #374151; white-space: nowrap; align-self: flex-end; }
    .btn:hover { background: #f3f4f6; }
    .btn-save { background: #15803d; color: white; border-color: #15803d; }
    .btn-save:hover { background: #166534; }
    .warning { background: #fef9c3; border: 1px solid #fde047; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #854d0e; margin-bottom: 10px; display: none; }
    .table-wrap { background: white; border-radius: 12px 12px 0 0; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    table { border-collapse: collapse; width: 100%; table-layout: fixed; }
    col.col-num { width: 48px; } col.col-photo { width: 60px; } col.col-type { width: 150px; } col.col-model { width: 140px; } col.col-check { width: 90px; } col.col-pack { width: auto; } col.col-btn { width: 90px; }
    thead th { background: #1e293b; color: white; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 12px; text-align: left; position: sticky; top: 0; z-index: 20; white-space: nowrap; }
    thead th.center { text-align: center; }
    tbody tr { border-bottom: 1px solid #f3f4f6; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9fafb; }
    tbody tr.is-packed { background: #f0fdf4; } tbody tr.is-packed:hover { background: #dcfce7; }
    tbody tr.is-changed { background: #fefce8; } tbody tr.is-changed:hover { background: #fef9c3; }
    tbody tr.is-error { background: #fef2f2; }
    td { padding: 0 12px; height: 44px; vertical-align: middle; color: #111827; font-size: 13px; overflow: visible; text-overflow: ellipsis; white-space: nowrap; position: relative; z-index: 1; }
    .cell-inner { display: flex; align-items: center; justify-content: center; height: 44px; }
    .cell-inner-start { display: flex; align-items: center; height: 44px; position: relative; z-index: 1; }
    .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #e5e7eb; }
    .thumb:hover { border-color: #9ca3af; }
    input[type="checkbox"] { width: 17px; height: 17px; cursor: pointer; accent-color: #15803d; display: block; flex-shrink: 0; }
    select.pack-sel { height: 28px; width: 100%; border: 1px solid #d1d5db; border-radius: 6px; background: #f9fafb; color: #111827; font-size: 12px; padding: 0 6px; cursor: pointer; position: relative; z-index: 5; }
    select.pack-sel:focus { outline: none; border-color: #6b7280; z-index: 10; }
    .save-row-btn { height: 26px; padding: 0 10px; font-size: 11px; border: 1px solid #15803d; border-radius: 6px; background: #15803d; color: white; cursor: pointer; white-space: nowrap; }
    .save-row-btn:hover { background: #166534; }
    .error-label { font-size: 12px; color: #dc2626; }
    .mono { font-family: monospace; font-size: 12px; }
    #preloader { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; color: #374151; z-index: 9999; }
    #preloader.hidden { display: none; }
    .spinner { width: 80px; height: 80px; border: 8px solid #e5e7eb; border-top: 8px solid #15803d; border-radius: 50%; animation: spin 2s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .empty-state { padding: 40px; text-align: center; color: #9ca3af; font-size: 14px; }
    .load-more-sentinel { height: 20px; }
    .photo-preview { position: fixed; display: none; z-index: 99999; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .photo-preview img { max-width: 400px; max-height: 70vh; border-radius: 8px; }
  </style>
</head>
<body>
<div id="preloader"><div class="spinner"></div>Загружаю данные...</div>
<div>
  <div class="header"><h2>📦 Отметка упаковки</h2><span class="ver">v.53</span></div>
  <div class="stats">
    <div class="stat-card"><span class="stat-label">Всего</span><span class="stat-value" id="totalCount">0</span></div>
    <div class="stat-card"><span class="stat-label">Упаковано</span><span class="stat-value green" id="totalPacked">0</span></div>
  </div>
  <div class="warning" id="warning"></div>
  <div class="filters">
    <div class="filter-group"><label>Тип изделия</label><select id="searchType" onchange="applyFilters()"><option value="">Все типы</option></select></div>
    <div class="filter-group"><label>Номер модели</label><input type="text" id="searchModel" placeholder="Введите номер модели..."></div>
    <button class="btn" onclick="clearFilters()">Сбросить</button>
    <button class="btn btn-save" onclick="saveAll()">💾 Записать всё</button>
  </div>
</div>
<div class="table-wrap">
  <table>
    <colgroup><col class="col-num"><col class="col-photo"><col class="col-type"><col class="col-model"><col class="col-check"><col class="col-pack"><col class="col-btn"></colgroup>
    <thead><tr><th>#</th><th>Фото</th><th>Тип изделия</th><th>Номер модели</th><th class="center">Упаковано</th><th>Коробка / пакет</th><th></th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="emptyState" class="empty-state" style="display:none">Нет записей по фильтру</div>
</div>
<div class="load-more-sentinel" id="sentinel"></div>
<div class="photo-preview" id="photoPreview"><img id="previewImg" src=""></div>
<script>
let globalData=[],originalData=[],filteredIndexes=[],changedRows=new Set(),errorRows=new Set(),packTypeOptions=[];
const PAGE_SIZE=50;let renderedCount=0,scrollObserver=null,mouseX=0,mouseY=0;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
function loadData(){showPreloader(true);google.script.run.withSuccessHandler(resp=>{if(!resp||resp.error){showPreloader(false);alert('Ошибка: '+(resp?resp.error:''));return;}try{globalData=resp.items||resp;if(!Array.isArray(globalData))globalData=[];originalData=JSON.parse(JSON.stringify(globalData));packTypeOptions=['3см коробка S (30x28x19.5)','5см коробка M (50x28x19.5)','пакет S 30x20','пакет L 60x30','коробка мелкая старая пробная'];changedRows=new Set();errorRows=new Set();buildTypeList();applyFilters();}catch(e){alert('Ошибка: '+e.message);}showPreloader(false);}).withFailureHandler(err=>{showPreloader(false);alert('Ошибка: '+(err.message||''));}).getData(true);}
function showPreloader(show){document.getElementById('preloader').classList.toggle('hidden',!show);}
function buildTypeList(){const types=new Set();globalData.forEach(row=>{if(row.type)types.add(row.type);});const sel=document.getElementById('searchType');sel.innerHTML='<option value="">Все типы</option>';Array.from(types).sort().forEach(t=>{sel.innerHTML+=`<option value="${t}">${t}</option>`;});}
function showWarning(msg){const w=document.getElementById('warning');w.style.display=msg?'block':'none';w.textContent=msg;}
function showPreview(url){const p=document.getElementById('photoPreview');document.getElementById('previewImg').src=url;p.style.display='block';p.style.left=(mouseX+15)+'px';p.style.top=(mouseY+15)+'px';p.onclick=()=>p.style.display='none';}
function isPacked(v){return v===true||v===1||v==='TRUE'||v==='true';}
function parseModel(m){m=m||'';if(!m.includes('-'))return{type:999999,modelNum:999999,design:0};const p=m.split('-');const t=parseInt(p[0])||0;const r=p[1]||'';return{type:t,modelNum:parseInt(r.split('/')[0])||0,design:parseInt(r.split('/')[1])||0};}
function compareModels(a,b){const ma=parseModel(globalData[a].model),mb=parseModel(globalData[b].model);if(ma.type!==mb.type)return ma.type-mb.type;if(ma.modelNum!==mb.modelNum)return ma.modelNum-mb.modelNum;return ma.design-mb.design;}
function applyFilters(reorder=false){const st=document.getElementById('searchType').value,sm=document.getElementById('searchModel').value.toLowerCase();const errors=[],packed=[],notPacked=[];globalData.forEach((row,i)=>{if((!st||(row.type||'')===st)&&(row.model||'').toString().toLowerCase().includes(sm)){if(errorRows.has(i))errors.push(i);else if(isPacked(row.repacked))packed.push(i);else notPacked.push(i);});errors.sort(compareModels);packed.sort(compareModels);notPacked.sort(compareModels);const ns=[...errors,...packed,...notPacked];if(reorder){filteredIndexes=ns;}else{const fo=filteredIndexes.filter(i=>{const r=globalData[i];return r&&(!st||(r.type||'')===st)&&(r.model||'').toString().toLowerCase().includes(sm);});filteredIndexes=fo.concat(ns.filter(i=>!new Set(fo).has(i)));}renderedCount=0;renderDashboard();renderTable();}
function renderDashboard(){document.getElementById('totalCount').textContent=filteredIndexes.length;document.getElementById('totalPacked').textContent=filteredIndexes.filter(i=>isPacked(globalData[i].repacked)).length;}
function buildRowHtml(i){const row=globalData[i],packed=isPacked(row.repacked),pt=row.packType||'',hasError=errorRows.has(i),isChanged=changedRows.has(i),pu=row.photoUrl||'';const cls=hasError?'is-error':isChanged?'is-changed':packed?'is-packed':'';const sel=`<select class="pack-sel" onchange="updatePackType(${i},this.value)"><option value="">—</option>${packTypeOptions.map(o=>`<option value="${o}"${pt===o?' selected':''}>${o}</option>`).join('')}</select>`;const th=pu?`<img class="thumb" loading="lazy" src="${pu}" onclick="showPreview('${pu}')" onerror="this.style.display='none'">`:'';
return `<tr class="${cls}"><td style="color:#9ca3af">${i+1}</td><td>${th}</td><td>${row.type||''}</td><td class="mono">${row.model||''}</td><td><div class="cell-inner">${hasError?'<span class="error-label">Ошибка</span>':`<input type="checkbox" ${packed?'checked':''} onchange="updateRow(${i},this.checked)">`}</div></td><td><div class="cell-inner-start">${hasError?'':sel}</div></td><td><div class="cell-inner">${isChanged&&!hasError?`<button class="save-row-btn" onclick="saveRow(${i})">Записать</button>`:''}</div></td></tr>`;}
function renderTable(){const tb=document.getElementById('tbody'),es=document.getElementById('emptyState');if(scrollObserver){scrollObserver.disconnect();scrollObserver=null;}if(!filteredIndexes.length){tb.innerHTML='';es.style.display='block';return;}es.style.display='none';renderedCount=0;tb.innerHTML='';appendRows();}
function appendRows(){const tb=document.getElementById('tbody'),end=Math.min(renderedCount+PAGE_SIZE,filteredIndexes.length),f=document.createDocumentFragment(),tmp=document.createElement('tbody');tmp.innerHTML=filteredIndexes.slice(renderedCount,end).map(i=>buildRowHtml(i)).join('');while(tmp.firstChild)f.appendChild(tmp.firstChild);tb.appendChild(f);renderedCount=end;if(renderedCount<filteredIndexes.length)setupSentinel();}
function setupSentinel(){if(scrollObserver)scrollObserver.disconnect();const s=document.getElementById('sentinel');scrollObserver=new IntersectionObserver(entries=>{if(entries[0].isIntersecting){scrollObserver.disconnect();scrollObserver=null;appendRows();}},{rootMargin:'200px'});scrollObserver.observe(s);}
function updateRow(i,checked){globalData[i].repacked=checked;if(checked!==isPacked(originalData[i].repacked)){changedRows.add(i);errorRows.delete(i);}else changedRows.delete(i);updateRowInDom(i);renderDashboard();}
function updatePackType(i,v){globalData[i].packType=v;if(v!==originalData[i].packType){changedRows.add(i);errorRows.delete(i);}else changedRows.delete(i);updateRowInDom(i);renderDashboard();}
function updateRowInDom(i){const pos=filteredIndexes.indexOf(i);if(pos===-1||pos>=renderedCount)return;const tr=document.getElementById('tbody').rows[pos];if(!tr)return;const row=globalData[i],packed=isPacked(row.repacked),hasError=errorRows.has(i),isChanged=changedRows.has(i);tr.className=hasError?'is-error':isChanged?'is-changed':packed?'is-packed':'';const bc=tr.cells[6].querySelector('.cell-inner');if(bc)bc.innerHTML=isChanged&&!hasError?`<button class="save-row-btn" onclick="saveRow(${i})">Записать</button>`:''}
function clearFilters(){document.getElementById('searchType').value='';document.getElementById('searchModel').value='';showWarning('');errorRows=new Set();applyFilters();}
function saveRow(i){showPreloader(true);google.script.run.withSuccessHandler(result=>{showPreloader(false);if(result.errors&&result.errors.length){errorRows.add(i);showWarning('Ошибки: '+result.errors.join(', '));}else{originalData[i]={...globalData[i]};changedRows.delete(i);}applyFilters(true);alert(result.errors&&result.errors.length?'Частично сохранено':'Сохранено');}).withFailureHandler(err=>{showPreloader(false);alert('Ошибка: '+err.message);}).saveData([{model:globalData[i].model,repacked:globalData[i].repacked,packType:globalData[i].packType}]);}
function saveAll(){if(!changedRows.size){alert('Нет изменений');return;}showPreloader(true);const updates=[];changedRows.forEach(i=>updates.push({model:globalData[i].model,repacked:globalData[i].repacked,packType:globalData[i].packType}));google.script.run.withSuccessHandler(result=>{showPreloader(false);if(result.errors&&result.errors.length)showWarning('Не сохранено: '+result.errors.join(', '));else showWarning('');originalData=JSON.parse(JSON.stringify(globalData));changedRows=new Set();errorRows=new Set();applyFilters(true);alert('Сохранено '+(result.saved?result.saved.length:updates.length)+' записей');}).withFailureHandler(err=>{showPreloader(false);alert('Ошибка: '+err.message);}).saveData(updates);}
document.getElementById('searchModel').addEventListener('input',applyFilters);
loadData();
</script></body></html>
